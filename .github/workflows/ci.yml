# The repo's first pipeline: the platform claim (macOS + Windows + Linux) is
# proven here, not by hand — no Windows hardware exists in this loop (R11-R13).
# Never run `uv lock` in CI: the lockfile is regenerated only on macOS (KTD-7);
# every lane installs strictly from the committed lock.
name: ci

on:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Sync from the committed lockfile
        run: uv sync --locked

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Types (explicit paths — bare invocation can match 0 files)
        run: uv run pyrefly check src tests

      - name: Backend tests (fake engine)
        run: uv run pytest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        run: npm ci
        working-directory: frontend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend tests
        run: npm test
        working-directory: frontend

      - name: Frontend build
        run: npm run build
        working-directory: frontend

  engine-smoke:
    # Real CPU engine end-to-end on the platforms nobody can test by hand (R12).
    # The model download is bounded by an HF cache keyed on OS + model tier.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    env:
      HF_HOME: ${{ github.workspace }}/.hf-cache
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Sync from the committed lockfile
        run: uv sync --locked

      - name: Cache the transcription model
        uses: actions/cache@v4
        with:
          path: .hf-cache
          key: hf-${{ runner.os }}-large-v3-turbo

      - name: Real CPU engine suite
        run: uv run pytest -m slow tests/test_transcription_cpu_slow.py
